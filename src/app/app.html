<!-- Main HTML page where we will be writing our HTML code -->
<!-- To check how to assign a main template to an HTML file, go to app.ts file -->
<h1>Hello World!</h1>

<!-- Accessing a component dynamically using View init (Go to app.ts for the implementation) -->
<ng-template #user></ng-template>

<!-- Accessing content-container component here, and using ng-content to add custom HTML tags -->
<app-content-container>
    <!-- Everything loaded inside this container is the content -->
    <app-rooms></app-rooms>
    <h1>Welcome to ng-content</h1>
    <app-header></app-header>
</app-content-container>

<!-- Avoid using HTML routing (href) instead of Angular routing (RouterLink) as it is slower to load -->
<!-- Routing will work via href but it's slower than RouteLink -->
<!-- <a [href]="'rooms'">Rooms</a>
<a [href]="'header'">Header</a> -->
<a [routerLink]="'rooms'">Rooms</a>
<a [routerLink]="'header'">Header</a>

<!-- We need to use this router outlet tag so that the routes mentioned within the page are accessible -->
<router-outlet></router-outlet>
